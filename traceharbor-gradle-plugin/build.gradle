apply plugin: 'java'
apply plugin: 'kotlin'

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation gradleApi()
    implementation project(':traceharbor-commons')
    implementation group: 'org.ow2.asm', name: 'asm', version: '9.6'
    implementation group: 'org.ow2.asm', name: 'asm-commons', version: '9.6'
    implementation 'com.android.tools.build:gradle:8.2.2'
    implementation project(':traceharbor-arscutil')
    implementation "org.jetbrains.kotlin:kotlin-stdlib:${gradle.KOTLIN_VERSION}"
}
sourceSets {
    main {
        java {
            srcDir "../traceharbor-gradle-plugin/src/main/java"
        }

        resources {
            srcDir '../traceharbor-gradle-plugin/src/main/resources'
        }
    }
}

version rootProject.ext.VERSION_NAME
group rootProject.ext.GROUP

if("External" == rootProject.ext.PUBLISH_CHANNEL) {
    apply from: rootProject.file('gradle/java-publish.gradle')
}
else {
    apply from: rootProject.file('gradle/WeChatPublish.gradle')
    wechatPublish {
        artifactId = POM_ARTIFACT_ID
    }
}